  postgres:
    image: postgres:17
    container_name: postgres
    volumes:
      - "./init.sql:/docker-entrypoint-initdb.d/init.sql"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    network_mode: host

  backend:
    image: sudoku/backend:latest
    container_name: backend
    ports:
      - "8080:8080"
    network_mode: host

